version: "3.8"

services:

  postgres:
    image: postgres:16
    container_name: tripmate_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tripmate_user
      POSTGRES_PASSWORD: tripmate_password
      POSTGRES_DB: tripmate_db
    ports:
      - "5432:5432"
    volumes:
      - tripmate_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripmate_user -d tripmate_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tripmate_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tripmate.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - tripmate_pgadmin_data:/var/lib/pgadmin

volumes:
  tripmate_postgres_data:
  tripmate_pgadmin_data: